services:
  postgres:
    container_name: tictactoe-postgres
    image: postgres:16-alpine
    platform: linux/amd64
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    container_name: tictactoe-nakama
    platform: linux/amd64
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name tictactoe
        --database.address postgres:localdb@postgres:5432/nakama
        --socket.server_key tictactoe-dev-key
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --runtime.path /nakama/data/modules
    restart: unless-stopped
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # HTTP / WebSocket API
      - "7351:7351"   # Nakama Console
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
